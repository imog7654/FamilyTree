<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Family Tree V1</title>
  <style>
    :root {
      --bg: #0f172a;
      --bg-soft: #1e293b;
      --panel: #111827cc;
      --card: #1f2937;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #f59e0b;
      --danger: #ef4444;
      --line: #334155;
      --shadow: 0 10px 30px rgba(0,0,0,0.35);
    }
    [data-theme='light'] {
      --bg: #e8edf6;
      --bg-soft: #f8fafc;
      --panel: #ffffffcc;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #475569;
      --accent: #0369a1;
      --danger: #dc2626;
      --line: #94a3b8;
      --shadow: 0 10px 24px rgba(2, 6, 23, 0.15);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--text);
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background:
        radial-gradient(1200px 800px at 0% 0%, #1d4ed822, transparent),
        radial-gradient(1000px 700px at 100% 100%, #f59e0b22, transparent),
        var(--bg);
      height: 100vh;
      overflow: hidden;
    }
    .app {
      height: 100vh;
      display: grid;
      grid-template-rows: 64px 1fr;
      grid-template-columns: 320px 1fr;
      grid-template-areas:
        "top top"
        "side main";
      gap: 12px;
      padding: 12px;
    }
    .topbar {
      grid-area: top;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 16px;
      backdrop-filter: blur(8px);
      background: var(--panel);
      box-shadow: var(--shadow);
    }
    .title { font-weight: 700; letter-spacing: 0.4px; }
    .grow { flex: 1; }
    .side {
      grid-area: side;
      border-radius: 16px;
      padding: 14px;
      backdrop-filter: blur(8px);
      background: var(--panel);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow: auto;
    }
    .main {
      grid-area: main;
      border-radius: 16px;
      position: relative;
      overflow: hidden;
      background: linear-gradient(180deg, var(--bg-soft), transparent);
      box-shadow: var(--shadow);
    }
    .viewport {
      position: absolute;
      inset: 0;
      cursor: grab;
      overflow: hidden;
    }
    .viewport.dragging { cursor: grabbing; }
    #scene {
      position: absolute;
      left: 0;
      top: 0;
      transform-origin: 0 0;
    }
    #edges { position: absolute; inset: 0; overflow: visible; }
    #nodes { position: absolute; inset: 0; }
    .viewport.grid-on {
      background-image:
        linear-gradient(rgba(255,255,255,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.06) 1px, transparent 1px);
      background-size: var(--grid-size, 50px) var(--grid-size, 50px);
      background-position: var(--grid-x, 0px) var(--grid-y, 0px);
    }
    [data-theme='light'] .viewport.grid-on {
      background-image:
        linear-gradient(rgba(0,0,0,0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,0.07) 1px, transparent 1px);
    }
    .node {
      position: absolute;
      width: 140px;
      border-radius: 14px;
      background: var(--card);
      border: 1px solid #ffffff22;
      box-shadow: var(--shadow);
      transition: transform .15s ease;
      overflow: hidden;
      text-align: center;
      cursor: grab;
    }
    .node.dragging-node { cursor: grabbing; transition: none; }
    .node:hover { transform: translateY(-2px); }
    .node.selected { outline: 2px solid var(--accent); }
    .node-photo {
      display: block;
      width: 140px;
      height: 140px;
      object-fit: cover;
      background: #334155;
      flex: 0 0 auto;
    }
    .node-info {
      padding: 7px 8px 9px;
    }
    .name {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      font-weight: 700;
      font-size: 13px;
      line-height: 1.35;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .meta {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--muted);
      font-size: 11px;
      margin-top: 2px;
    }
    .node-actions {
      display: flex;
      gap: 6px;
      margin-top: 8px;
      flex-wrap: wrap;
    }
    button, input, select, textarea {
      border: 1px solid #ffffff22;
      border-radius: 10px;
      background: var(--bg-soft);
      color: var(--text);
      padding: 8px 10px;
    }
    button {
      cursor: pointer;
      background: #ffffff10;
      transition: .15s;
    }
    button:hover { background: #ffffff20; }
    .btn-accent { background: var(--accent); color: #fff; border: none; }
    .btn-danger { background: var(--danger); color: #fff; border: none; }
    .hint { color: var(--muted); font-size: 12px; }
    .row { display: flex; gap: 8px; }
    .col { flex: 1; }
    .section { border-top: 1px solid #ffffff22; padding-top: 10px; }
    .modal {
      position: fixed;
      inset: 0;
      background: #00000066;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 12px;
      z-index: 20;
    }
    .modal.open { display: flex; }
    .modal-card {
      width: min(640px, 100%);
      max-height: 90vh;
      overflow: auto;
      border-radius: 14px;
      padding: 14px;
      background: var(--card);
      box-shadow: var(--shadow);
    }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .stack { display: flex; flex-direction: column; gap: 6px; }
    .footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 12px; }
    .picker { position: relative; }
    .picker-input { width: 100%; }
    .picker-dropdown {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      z-index: 50;
      background: var(--card);
      border: 1px solid #ffffff33;
      border-radius: 10px;
      max-height: 180px;
      overflow-y: auto;
      display: none;
      box-shadow: var(--shadow);
    }
    .picker-dropdown.open { display: block; }
    .picker-option {
      padding: 8px 12px;
      cursor: pointer;
      font-size: 13px;
    }
    .picker-option:hover { background: #ffffff15; }
    .picker-option .opt-id { color: var(--muted); font-size: 11px; margin-left: 6px; }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      border: 1px solid #ffffff22;
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 11px;
      color: var(--muted);
    }
    @media (max-width: 900px) {
      .app {
        grid-template-columns: 1fr;
        grid-template-rows: 64px auto 1fr;
        grid-template-areas:
          "top"
          "side"
          "main";
      }
      .side { max-height: 35vh; }
    }
  </style>
</head>
<body>
  <div class="app" data-theme="dark" id="app">
    <div class="topbar">
      <div class="title">Family Tree V1</div>
      <input id="searchInput" placeholder="Search by name..." />
      <button id="searchBtn">Find</button>
      <button id="reloadBtn">Reload</button>
      <button id="addBtn" class="btn-accent">Add Person</button>
      <button id="themeBtn">Toggle Theme</button>
      <button id="gridBtn">Grid</button>
      <button id="autoAlignBtn">Auto-align</button>
      <button id="snapGridBtn">Snap to Grid</button>
      <div class="grow"></div>
      <button id="configBtn">Config</button>
    </div>

    <aside class="side">
      <div>
        <div class="pill">Selected Person</div>
        <h3 id="selectedName">None</h3>
        <div id="selectedMeta" class="hint">Select a node from the tree</div>
      </div>
      <div class="row">
        <button class="col" id="focusBtn">Center</button>
        <button class="col" id="editBtn">Edit</button>
      </div>
      <div class="row">
        <button class="col" id="addSpouseBtn">Add Spouse</button>
        <button class="col" id="addChildBtn">Add Child</button>
      </div>
      <button id="deleteBtn" class="btn-danger">Delete Person</button>

      <div class="section">
        <div class="pill">Status</div>
        <div id="statusText" class="hint">Ready</div>
      </div>

      <div class="section">
        <div class="pill">Config Tip</div>
        <div class="hint">Set the Apps Script web app URL in Config before loading data.</div>
      </div>
    </aside>

    <main class="main">
      <div id="viewport" class="viewport">
        <div id="scene">
          <svg id="edges"></svg>
          <div id="nodes"></div>
        </div>
      </div>
    </main>
  </div>

  <div id="personModal" class="modal">
    <div class="modal-card">
      <h3 id="personModalTitle">Add Person</h3>
      <div class="grid2">
        <label class="stack">Full Name<input id="pFullName" /></label>
        <label class="stack">Gender
          <select id="pGender">
            <option value="">Unknown</option>
            <option value="M">Male</option>
            <option value="F">Female</option>
            <option value="Other">Other</option>
          </select>
        </label>
        <label class="stack">Birth Date<input id="pBirthDate" placeholder="1945 / 1945-06 / 1945-06-12" /></label>
        <label class="stack">Death Date<input id="pDeathDate" /></label>
        <label class="stack">Father
          <div class="picker" id="fatherPicker">
            <input class="picker-input" id="pFatherSearch" placeholder="Search by name…" autocomplete="off" />
            <input type="hidden" id="pFatherId" />
            <div class="picker-dropdown" id="fatherDropdown"></div>
          </div>
        </label>
        <label class="stack">Mother
          <div class="picker" id="motherPicker">
            <input class="picker-input" id="pMotherSearch" placeholder="Search by name…" autocomplete="off" />
            <input type="hidden" id="pMotherId" />
            <div class="picker-dropdown" id="motherDropdown"></div>
          </div>
        </label>
      </div>
      <label class="stack" style="margin-top:10px;">Notes<textarea id="pNotes" rows="3"></textarea></label>
      <label class="stack" style="margin-top:10px;">Photo (optional)<input id="pPhoto" type="file" accept="image/*" /></label>
      <div class="footer">
        <button id="cancelPersonBtn">Cancel</button>
        <button id="savePersonBtn" class="btn-accent">Save</button>
      </div>
    </div>
  </div>

  <div id="spouseModal" class="modal">
    <div class="modal-card">
      <h3>Add Spouse Link</h3>
      <div class="grid2" style="margin-top:10px;">
        <label class="stack">Person<input id="sPerson1Name" disabled /></label>
        <label class="stack">Spouse
          <div class="picker">
            <input class="picker-input" id="sSpouseSearch" placeholder="Search by name…" autocomplete="off" />
            <input type="hidden" id="sPerson2" />
            <div class="picker-dropdown" id="spouseDropdown"></div>
          </div>
        </label>
      </div>
      <div class="footer">
        <button id="cancelSpouseBtn">Cancel</button>
        <button id="saveSpouseBtn" class="btn-accent">Create Link</button>
      </div>
    </div>
  </div>

  <div id="configModal" class="modal">
    <div class="modal-card">
      <h3>Configuration</h3>
      <label class="stack">Apps Script Web App URL<input id="cfgEndpoint" placeholder="https://script.google.com/macros/s/.../exec" /></label>
      <label class="stack" style="margin-top:10px;">Secret<input id="cfgSecret" type="password" placeholder="Your shared secret" /></label>
      <div class="hint">Saved in browser localStorage. Never shared with other users automatically.</div>
      <div class="footer">
        <button id="cancelConfigBtn">Cancel</button>
        <button id="saveConfigBtn" class="btn-accent">Save Config</button>
      </div>
    </div>
  </div>

  <script>
    const GRID = 50; // scene units for snap grid

    const state = {
      endpoint: localStorage.getItem('familyTreeEndpoint') || '',
      secret: localStorage.getItem('familyTreeSecret') || '',
      persons: [],
      spouses: [],
      selectedId: null,
      scene: { x: 100, y: 80, scale: 1 },
      mode: 'create',
      editId: null,
      manualPos: {},
      gridVisible: false
    };

    const dom = {
      app: document.getElementById('app'),
      status: document.getElementById('statusText'),
      nodes: document.getElementById('nodes'),
      edges: document.getElementById('edges'),
      viewport: document.getElementById('viewport'),
      scene: document.getElementById('scene'),
      searchInput: document.getElementById('searchInput'),
      selectedName: document.getElementById('selectedName'),
      selectedMeta: document.getElementById('selectedMeta')
    };

    function setStatus(msg) { dom.status.textContent = msg; }

    function api(action, payload = {}) {
      if (!state.endpoint) return Promise.reject(new Error('Set Apps Script URL in Config.'));
      if (!state.secret) return Promise.reject(new Error('Set the Secret in Config.'));
      return new Promise((resolve, reject) => {
        const cbName = 'ftCb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
        const url = new URL(state.endpoint);
        url.searchParams.set('secret', state.secret);
        url.searchParams.set('action', action);
        url.searchParams.set('callback', cbName);
        if (Object.keys(payload).length > 0) {
          url.searchParams.set('payload', JSON.stringify(payload));
        }
        const script = document.createElement('script');
        window[cbName] = (json) => {
          delete window[cbName];
          script.remove();
          if (!json.success) reject(new Error(json.error || 'API error'));
          else resolve(json.data);
        };
        script.onerror = () => {
          delete window[cbName];
          script.remove();
          reject(new Error('Request failed. Check URL and Secret in Config.'));
        };
        script.src = url.toString();
        document.head.appendChild(script);
      });
    }

    async function loadAll() {
      try {
        setStatus('Loading data...');
        const data = await api('getAllData');
        state.persons = data.persons || [];
        state.spouses = data.spouses || [];
        renderTree();
        setStatus(`Loaded ${state.persons.length} people, ${state.spouses.length} spouse links`);
      } catch (e) {
        setStatus(e.message);
      }
    }

    function years(person) {
      const b = person.BirthDate || '?';
      const d = person.DeathDate || '';
      return d ? `${b} - ${d}` : `${b}`;
    }

    function buildGenerationMap(persons) {
      const byId = Object.fromEntries(persons.map(p => [p.PersonID, p]));
      const gen = {};
      persons.forEach(p => { gen[p.PersonID] = 0; });

      for (let t = 0; t < persons.length; t++) {
        let changed = false;
        for (const p of persons) {
          const parentGens = [];
          if (p.FatherID && byId[p.FatherID]) parentGens.push(gen[p.FatherID]);
          if (p.MotherID && byId[p.MotherID]) parentGens.push(gen[p.MotherID]);
          if (parentGens.length) {
            const next = Math.max(...parentGens) + 1;
            if (next > gen[p.PersonID]) {
              gen[p.PersonID] = next;
              changed = true;
            }
          }
        }
        if (!changed) break;
      }

      return gen;
    }

    function computeLayout() {
      const NW = 140, COUPLE_GAP = 18, NODE_GAP = 30, FAMILY_GAP = 80, yGap = 270;
      const persons = state.persons;
      if (!persons.length) return {};

      const byId = Object.fromEntries(persons.map(p => [p.PersonID, p]));
      const gen = buildGenerationMap(persons);

      // First spouse per person (one spouse used for layout couple-unit)
      const spouseOf = {};
      for (const s of state.spouses) {
        if (!spouseOf[s.Person1ID]) spouseOf[s.Person1ID] = s.Person2ID;
        if (!spouseOf[s.Person2ID]) spouseOf[s.Person2ID] = s.Person1ID;
      }

      // Children per person
      const childrenOf = {};
      for (const p of persons) {
        for (const pid of [p.FatherID, p.MotherID]) {
          if (pid && byId[pid]) {
            (childrenOf[pid] = childrenOf[pid] || []).push(p.PersonID);
          }
        }
      }

      // Combined children of a couple, sorted by birth date
      function coupleChildren(pid) {
        const sp = spouseOf[pid];
        return [...new Set([...(childrenOf[pid] || []), ...(sp ? childrenOf[sp] || [] : [])])]
          .sort((a, b) => (byId[a]?.BirthDate || '').localeCompare(byId[b]?.BirthDate || ''));
      }

      // Group by generation
      const byGen = {};
      for (const p of persons) {
        const g = gen[p.PersonID] ?? 0;
        (byGen[g] = byGen[g] || []).push(p);
      }
      const gens = Object.keys(byGen).map(Number).sort((a, b) => a - b);

      const pos = {};

      // Helper: x-midpoint of a parent pair (used to order family groups)
      function parentCenterX(fid, mid) {
        const fx = fid && pos[fid] != null ? pos[fid].x + NW / 2 : null;
        const mx = mid && pos[mid] != null ? pos[mid].x + NW / 2 : null;
        if (fx != null && mx != null) return (fx + mx) / 2;
        return fx ?? mx ?? Infinity;
      }

      // PASS 1 — top-down: place each generation, families ordered by parent position
      for (const g of gens) {
        const genPersons = byGen[g];
        const globalPlaced = new Set();

        // Group siblings by (fatherID + motherID) pair
        const familyMap = new Map();
        for (const p of genPersons) {
          const fid = (p.FatherID && byId[p.FatherID]) ? p.FatherID : '';
          const mid = (p.MotherID && byId[p.MotherID]) ? p.MotherID : '';
          const key = [fid, mid].filter(Boolean).sort().join('|') || p.PersonID;
          if (!familyMap.has(key)) familyMap.set(key, { persons: [], fid, mid });
          familyMap.get(key).persons.push(p);
        }

        // Sort families: ones with parents first (ordered by parent x), then rootless ones
        const families = [...familyMap.values()].sort((a, b) => {
          const xa = parentCenterX(a.fid, a.mid);
          const xb = parentCenterX(b.fid, b.mid);
          if (!isFinite(xa) && !isFinite(xb)) return 0;
          if (!isFinite(xa)) return 1;  // rootless → right
          if (!isFinite(xb)) return -1;
          return xa - xb;
        });

        let x = 0;

        for (const family of families) {
          // Sort siblings by birth date
          const members = [...family.persons].sort((a, b) =>
            (a.BirthDate || '').localeCompare(b.BirthDate || '')
          );
          const slots = [];
          const sPlaced = new Set();

          for (const p of members) {
            if (sPlaced.has(p.PersonID) || globalPlaced.has(p.PersonID)) continue;
            sPlaced.add(p.PersonID);
            const sp = spouseOf[p.PersonID];
            // Pair with spouse if they're in the same generation and not yet placed
            const spOk = sp && byId[sp] && (gen[sp] ?? 0) === g && !globalPlaced.has(sp);
            if (spOk) {
              sPlaced.add(sp);
              slots.push([p, byId[sp]]);
            } else {
              slots.push([p]);
            }
          }
          if (!slots.length) continue;

          // Family width
          let fw = 0;
          slots.forEach((slot, i) => {
            fw += slot.length === 2 ? NW + COUPLE_GAP + NW : NW;
            if (i < slots.length - 1) fw += NODE_GAP;
          });

          // Try to center family under its parents
          const pc = parentCenterX(family.fid, family.mid);
          const startX = isFinite(pc) ? Math.max(x, pc - fw / 2) : x;

          let sx = startX;
          for (const slot of slots) {
            slot.forEach((p, j) => {
              pos[p.PersonID] = { x: sx + j * (NW + COUPLE_GAP), y: g * yGap };
              globalPlaced.add(p.PersonID);
            });
            sx += (slot.length === 2 ? NW + COUPLE_GAP + NW : NW) + NODE_GAP;
          }
          x = sx - NODE_GAP + FAMILY_GAP;
        }

        // Place any stragglers (e.g. spouses whose partner was placed in a different group)
        for (const p of genPersons) {
          if (!globalPlaced.has(p.PersonID)) {
            pos[p.PersonID] = { x, y: g * yGap };
            x += NW + NODE_GAP;
          }
        }
      }

      // PASS 2 — bottom-up: nudge each parent couple to be centered over their children.
      // Process each generation from deepest to shallowest; maintain a left-to-right
      // sweep so we never push a couple onto a sibling couple.
      for (const g of [...gens].reverse()) {
        const processed = new Set();
        const ordered = [...(byGen[g] || [])].sort((a, b) =>
          (pos[a.PersonID]?.x ?? 0) - (pos[b.PersonID]?.x ?? 0)
        );
        let minX = 0;

        for (const p of ordered) {
          if (processed.has(p.PersonID)) continue;
          processed.add(p.PersonID);
          const sp = spouseOf[p.PersonID];
          const spHere = sp && pos[sp] && (gen[sp] ?? 0) === g;
          if (spHere) processed.add(sp);

          const coupleW = spHere ? NW + COUPLE_GAP + NW : NW;
          const children = coupleChildren(p.PersonID).filter(c => pos[c]);

          let newX = Math.max(minX, pos[p.PersonID]?.x ?? 0);
          if (children.length) {
            const xs = children.map(c => pos[c].x);
            const center = (Math.min(...xs) + Math.max(...xs) + NW) / 2;
            newX = Math.max(minX, center - coupleW / 2);
          }

          if (pos[p.PersonID]) {
            pos[p.PersonID] = { ...pos[p.PersonID], x: newX };
            if (spHere) pos[sp] = { ...pos[sp], x: newX + NW + COUPLE_GAP };
          }
          minX = newX + coupleW + NODE_GAP;
        }
      }

      // Apply manual position overrides (dragged nodes stay put)
      Object.entries(state.manualPos).forEach(([id, mp]) => {
        if (pos[id] !== undefined) pos[id] = { x: mp.x, y: mp.y };
      });

      return pos;
    }

    function renderTree() {
      dom.nodes.innerHTML = '';
      dom.edges.innerHTML = '';
      if (!state.persons.length) return;

      // Node geometry constants.
      const NW = 140;   // node width
      const NH = 190;   // node total height (approx)
      const NC = NW / 2; // horizontal center offset

      const pos = computeLayout();
      const byId = Object.fromEntries(state.persons.map(p => [p.PersonID, p]));

      const maxX = Math.max(...Object.values(pos).map(p => p.x)) + NW + 60;
      const maxY = Math.max(...Object.values(pos).map(p => p.y)) + NH + 60;
      dom.scene.style.width = `${maxX}px`;
      dom.scene.style.height = `${maxY}px`;
      dom.edges.setAttribute('width', maxX);
      dom.edges.setAttribute('height', maxY);

      for (const p of state.persons) {
        const node = document.createElement('div');
        node.className = 'node' + (state.selectedId === p.PersonID ? ' selected' : '');
        node.style.left = `${pos[p.PersonID].x}px`;
        node.style.top = `${pos[p.PersonID].y}px`;
        node.dataset.id = p.PersonID;
        node.innerHTML = `
          <img class="node-photo" src="${p.PhotoURL || ''}" onerror="this.src=''" alt="" />
          <div class="node-info">
            <div class="name">${escapeHtml(p.FullName || '(No Name)')}</div>
            <div class="meta">${escapeHtml(years(p))}</div>
          </div>
        `;
        node.onclick = () => selectPerson(p.PersonID);
        dom.nodes.appendChild(node);
      }

      function line(x1, y1, x2, y2, color, width, dash = '') {
        const el = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        el.setAttribute('x1', x1);
        el.setAttribute('y1', y1);
        el.setAttribute('x2', x2);
        el.setAttribute('y2', y2);
        el.setAttribute('stroke', color);
        el.setAttribute('stroke-width', width);
        if (dash) el.setAttribute('stroke-dasharray', dash);
        dom.edges.appendChild(el);
      }

      // Spouse connectors — dashed cyan line at mid-photo height.
      for (const s of state.spouses) {
        const a = pos[s.Person1ID], b = pos[s.Person2ID];
        if (!a || !b) continue;
        line(a.x + NW, a.y + 70, b.x, b.y + 70, '#22d3ee', 2, '6 4');
      }

      // Parent-child connectors.
      for (const child of state.persons) {
        const c = pos[child.PersonID];
        if (!c) continue;
        const father = child.FatherID && pos[child.FatherID] ? pos[child.FatherID] : null;
        const mother = child.MotherID && pos[child.MotherID] ? pos[child.MotherID] : null;
        if (!father && !mother) continue;

        if (father && mother) {
          const mx = ((father.x + NC) + (mother.x + NC)) / 2;
          const py = Math.max(father.y + NH, mother.y + NH);
          line(mx, py, mx, c.y, '#94a3b8', 2);
          line(mx, c.y, c.x + NC, c.y, '#94a3b8', 2);
        } else {
          const p = father || mother;
          line(p.x + NC, p.y + NH, c.x + NC, c.y, '#94a3b8', 2);
        }
      }

      updateSceneTransform();
      if (state.selectedId && byId[state.selectedId]) updateSelectedPanel(byId[state.selectedId]);
    }

    function updateSceneTransform() {
      dom.scene.style.transform = `translate(${state.scene.x}px, ${state.scene.y}px) scale(${state.scene.scale})`;
      const gs = GRID * state.scene.scale;
      dom.viewport.style.setProperty('--grid-size', `${gs}px`);
      dom.viewport.style.setProperty('--grid-x', `${state.scene.x % gs}px`);
      dom.viewport.style.setProperty('--grid-y', `${state.scene.y % gs}px`);
    }

    function selectPerson(personId) {
      state.selectedId = personId;
      const p = state.persons.find(x => x.PersonID === personId);
      if (p) updateSelectedPanel(p);
      renderTree();
    }

    function updateSelectedPanel(p) {
      dom.selectedName.textContent = p.FullName || p.PersonID;
      dom.selectedMeta.textContent = `${p.PersonID} | ${years(p)} | Gender: ${p.Gender || 'Unknown'}`;
    }

    function focusSelected() {
      const p = state.persons.find(x => x.PersonID === state.selectedId);
      if (!p) return;
      const pos = computeLayout()[p.PersonID];
      state.scene.x = Math.max(60, window.innerWidth / 2 - (pos.x + 90));
      state.scene.y = Math.max(80, window.innerHeight / 2 - (pos.y + 44));
      updateSceneTransform();
    }

    async function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function setupPersonPicker(searchId, hiddenId, dropdownId, excludeId, onSelect) {
      const searchEl = document.getElementById(searchId);
      const hiddenEl = document.getElementById(hiddenId);
      const dropdownEl = document.getElementById(dropdownId);

      function renderOptions(q) {
        const matches = state.persons.filter(p =>
          p.PersonID !== excludeId &&
          (p.FullName || '').toLowerCase().includes(q.toLowerCase())
        );
        dropdownEl.innerHTML = '';
        if (!q && !matches.length) { dropdownEl.classList.remove('open'); return; }
        const none = document.createElement('div');
        none.className = 'picker-option';
        none.innerHTML = '<em style="color:var(--muted)">— None —</em>';
        none.onclick = () => {
          hiddenEl.value = ''; searchEl.value = ''; dropdownEl.classList.remove('open');
          if (onSelect) onSelect(null);
        };
        dropdownEl.appendChild(none);
        matches.slice(0, 30).forEach(p => {
          const opt = document.createElement('div');
          opt.className = 'picker-option';
          opt.innerHTML = `${escapeHtml(p.FullName)}<span class="opt-id">${escapeHtml(p.PersonID)}</span>`;
          opt.onclick = () => {
            hiddenEl.value = p.PersonID;
            searchEl.value = p.FullName;
            dropdownEl.classList.remove('open');
            if (onSelect) onSelect(p);
          };
          dropdownEl.appendChild(opt);
        });
        dropdownEl.classList.add('open');
      }

      searchEl.oninput = () => renderOptions(searchEl.value);
      searchEl.onfocus = () => renderOptions(searchEl.value);
      searchEl.onblur = () => setTimeout(() => dropdownEl.classList.remove('open'), 150);
    }

    function findSpouseOf(personId) {
      const link = state.spouses.find(s => s.Person1ID === personId || s.Person2ID === personId);
      if (!link) return null;
      const sid = link.Person1ID === personId ? link.Person2ID : link.Person1ID;
      return state.persons.find(p => p.PersonID === sid) || null;
    }

    function openPersonModal(mode, person) {
      state.mode = mode;
      state.editId = person ? person.PersonID : null;
      document.getElementById('personModalTitle').textContent = mode === 'edit' ? 'Edit Person' : 'Add Person';
      document.getElementById('pFullName').value = person?.FullName || '';
      document.getElementById('pGender').value = person?.Gender || '';
      document.getElementById('pBirthDate').value = person?.BirthDate || '';
      document.getElementById('pDeathDate').value = person?.DeathDate || '';
      document.getElementById('pNotes').value = person?.Notes || '';
      document.getElementById('pPhoto').value = '';

      const fatherP = person?.FatherID ? state.persons.find(p => p.PersonID === person.FatherID) : null;
      const motherP = person?.MotherID ? state.persons.find(p => p.PersonID === person.MotherID) : null;
      document.getElementById('pFatherId').value = person?.FatherID || '';
      document.getElementById('pFatherSearch').value = fatherP ? fatherP.FullName : '';
      document.getElementById('pMotherId').value = person?.MotherID || '';
      document.getElementById('pMotherSearch').value = motherP ? motherP.FullName : '';

      setupPersonPicker('pFatherSearch', 'pFatherId', 'fatherDropdown', state.editId, (fatherP) => {
        if (!fatherP) return;
        if (!document.getElementById('pMotherId').value) {
          const sp = findSpouseOf(fatherP.PersonID);
          if (sp) { document.getElementById('pMotherId').value = sp.PersonID; document.getElementById('pMotherSearch').value = sp.FullName; }
        }
      });
      setupPersonPicker('pMotherSearch', 'pMotherId', 'motherDropdown', state.editId, (motherP) => {
        if (!motherP) return;
        if (!document.getElementById('pFatherId').value) {
          const sp = findSpouseOf(motherP.PersonID);
          if (sp) { document.getElementById('pFatherId').value = sp.PersonID; document.getElementById('pFatherSearch').value = sp.FullName; }
        }
      });

      document.getElementById('personModal').classList.add('open');
    }

    function closeModal(id) { document.getElementById(id).classList.remove('open'); }

    async function savePerson() {
      try {
        const payload = {
          FullName: document.getElementById('pFullName').value.trim(),
          Gender: document.getElementById('pGender').value,
          BirthDate: document.getElementById('pBirthDate').value.trim(),
          DeathDate: document.getElementById('pDeathDate').value.trim(),
          FatherID: document.getElementById('pFatherId').value.trim(),
          MotherID: document.getElementById('pMotherId').value.trim(),
          Notes: document.getElementById('pNotes').value.trim()
        };

        if (!payload.FullName) throw new Error('Full Name is required.');

        let record;
        if (state.mode === 'edit') {
          payload.PersonID = state.editId;
          record = await api('updatePerson', payload);
        } else {
          record = await api('createPerson', payload);
        }

        const file = document.getElementById('pPhoto').files[0];
        if (file) {
          if (!file.type.startsWith('image/')) throw new Error('Only image files allowed.');
          const base64Data = await fileToBase64(file);
          const upload = await api('uploadPhoto', {
            PersonID: record.PersonID,
            fileName: file.name,
            mimeType: file.type,
            base64Data
          });
          await api('updatePerson', { PersonID: record.PersonID, ...upload });
        }

        // Auto-link father and mother as spouses if both are set and not already linked.
        const fId = payload.FatherID;
        const mId = payload.MotherID;
        if (fId && mId) {
          const linked = state.spouses.some(s =>
            (s.Person1ID === fId && s.Person2ID === mId) ||
            (s.Person1ID === mId && s.Person2ID === fId)
          );
          if (!linked) {
            try { await api('createSpouseLink', { Person1ID: fId, Person2ID: mId, RelationshipType: 'Married' }); } catch (_) {}
          }
        }

        closeModal('personModal');
        await loadAll();
        selectPerson(record.PersonID);
      } catch (e) {
        setStatus(e.message);
      }
    }

    async function deleteSelected() {
      if (!state.selectedId) return;
      const yes = confirm('Hard delete this person? This removes spouse links and clears parent references in children.');
      if (!yes) return;
      try {
        await api('deletePerson', { PersonID: state.selectedId });
        state.selectedId = null;
        await loadAll();
      } catch (e) {
        setStatus(e.message);
      }
    }

    async function createSpouse() {
      try {
        const p1 = document.getElementById('spouseModal').dataset.p1 || '';
        const p2 = document.getElementById('sPerson2').value.trim();
        if (!p1 || !p2) throw new Error('Please select a spouse.');
        await api('createSpouseLink', { Person1ID: p1, Person2ID: p2, RelationshipType: 'Married' });
        closeModal('spouseModal');
        await loadAll();
      } catch (e) {
        setStatus(e.message);
      }
    }

    async function addChildFlow() {
      const parent = state.persons.find(p => p.PersonID === state.selectedId);
      if (!parent) return;
      openPersonModal('create', null);
      if (parent.Gender === 'F') {
        document.getElementById('pMotherId').value = parent.PersonID;
        document.getElementById('pMotherSearch').value = parent.FullName || '';
      } else {
        document.getElementById('pFatherId').value = parent.PersonID;
        document.getElementById('pFatherSearch').value = parent.FullName || '';
      }
    }

    function searchAndFocus() {
      const q = dom.searchInput.value.trim().toLowerCase();
      if (!q) return;
      const hit = state.persons.find(p => (p.FullName || '').toLowerCase().includes(q));
      if (!hit) {
        setStatus('No match found.');
        return;
      }
      selectPerson(hit.PersonID);
      focusSelected();
    }

    function wireEvents() {
      document.getElementById('reloadBtn').onclick = loadAll;
      document.getElementById('addBtn').onclick = () => openPersonModal('create', null);
      document.getElementById('editBtn').onclick = () => {
        const p = state.persons.find(x => x.PersonID === state.selectedId);
        if (p) openPersonModal('edit', p);
      };
      document.getElementById('deleteBtn').onclick = deleteSelected;
      document.getElementById('focusBtn').onclick = focusSelected;
      document.getElementById('addChildBtn').onclick = addChildFlow;
      document.getElementById('savePersonBtn').onclick = savePerson;
      document.getElementById('cancelPersonBtn').onclick = () => closeModal('personModal');

      document.getElementById('addSpouseBtn').onclick = () => {
        if (!state.selectedId) return;
        const p = state.persons.find(x => x.PersonID === state.selectedId);
        if (!p) return;
        const modal = document.getElementById('spouseModal');
        modal.dataset.p1 = state.selectedId;
        document.getElementById('sPerson1Name').value = p.FullName || p.PersonID;
        document.getElementById('sPerson2').value = '';
        document.getElementById('sSpouseSearch').value = '';
        setupPersonPicker('sSpouseSearch', 'sPerson2', 'spouseDropdown', state.selectedId);
        modal.classList.add('open');
      };
      document.getElementById('saveSpouseBtn').onclick = createSpouse;
      document.getElementById('cancelSpouseBtn').onclick = () => closeModal('spouseModal');

      document.getElementById('searchBtn').onclick = searchAndFocus;
      dom.searchInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') searchAndFocus(); });

      document.getElementById('themeBtn').onclick = () => {
        dom.app.dataset.theme = dom.app.dataset.theme === 'dark' ? 'light' : 'dark';
      };

      document.getElementById('gridBtn').onclick = () => {
        state.gridVisible = !state.gridVisible;
        dom.viewport.classList.toggle('grid-on', state.gridVisible);
      };

      // Auto-align: clear manual overrides and let the relationship algorithm place everything.
      document.getElementById('autoAlignBtn').onclick = () => {
        state.manualPos = {};
        renderTree();
        setStatus('Auto-aligned by relationships.');
      };

      // Snap to Grid: keep current positions but snap each node to the nearest grid cell.
      document.getElementById('snapGridBtn').onclick = () => {
        const pos = computeLayout();
        for (const p of state.persons) {
          const cur = pos[p.PersonID];
          if (cur) state.manualPos[p.PersonID] = { x: Math.round(cur.x / GRID) * GRID, y: Math.round(cur.y / GRID) * GRID };
        }
        renderTree();
        setStatus('Snapped to grid.');
      };

      document.getElementById('configBtn').onclick = () => {
        document.getElementById('cfgEndpoint').value = state.endpoint;
        document.getElementById('cfgSecret').value = state.secret;
        document.getElementById('configModal').classList.add('open');
      };
      document.getElementById('cancelConfigBtn').onclick = () => closeModal('configModal');
      document.getElementById('saveConfigBtn').onclick = () => {
        const v = document.getElementById('cfgEndpoint').value.trim();
        const s = document.getElementById('cfgSecret').value.trim();
        state.endpoint = v;
        state.secret = s;
        localStorage.setItem('familyTreeEndpoint', v);
        localStorage.setItem('familyTreeSecret', s);
        closeModal('configModal');
        setStatus('Config saved.');
      };

      // Pan, zoom, and node dragging.
      let dragging = false, startX = 0, startY = 0;
      let nodeDrag = null;

      dom.viewport.addEventListener('mousedown', (e) => {
        const nodeEl = e.target.closest('.node');
        if (nodeEl) {
          // Start node drag.
          e.preventDefault();
          const id = nodeEl.dataset.id;
          const pos = computeLayout();
          const cur = pos[id] || { x: 0, y: 0 };
          const rect = dom.viewport.getBoundingClientRect();
          const sx = (e.clientX - rect.left - state.scene.x) / state.scene.scale;
          const sy = (e.clientY - rect.top - state.scene.y) / state.scene.scale;
          nodeDrag = { id, nodeEl, startSX: sx, startSY: sy, origX: cur.x, origY: cur.y };
          nodeEl.classList.add('dragging-node');
          return;
        }
        // Start viewport pan.
        dragging = true;
        dom.viewport.classList.add('dragging');
        startX = e.clientX - state.scene.x;
        startY = e.clientY - state.scene.y;
      });

      window.addEventListener('mousemove', (e) => {
        if (nodeDrag) {
          const rect = dom.viewport.getBoundingClientRect();
          const sx = (e.clientX - rect.left - state.scene.x) / state.scene.scale;
          const sy = (e.clientY - rect.top - state.scene.y) / state.scene.scale;
          const nx = nodeDrag.origX + (sx - nodeDrag.startSX);
          const ny = nodeDrag.origY + (sy - nodeDrag.startSY);
          state.manualPos[nodeDrag.id] = { x: nx, y: ny };
          nodeDrag.nodeEl.style.left = `${nx}px`;
          nodeDrag.nodeEl.style.top = `${ny}px`;
          return;
        }
        if (!dragging) return;
        state.scene.x = e.clientX - startX;
        state.scene.y = e.clientY - startY;
        updateSceneTransform();
      });

      window.addEventListener('mouseup', () => {
        if (nodeDrag) {
          nodeDrag.nodeEl.classList.remove('dragging-node');
          nodeDrag = null;
          return;
        }
        dragging = false;
        dom.viewport.classList.remove('dragging');
      });

      dom.viewport.addEventListener('wheel', (e) => {
        e.preventDefault();
        const delta = e.deltaY < 0 ? 1.1 : 0.9;
        const newScale = Math.max(0.3, Math.min(2.2, state.scene.scale * delta));
        const rect = dom.viewport.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;
        state.scene.x = mx - (mx - state.scene.x) * newScale / state.scene.scale;
        state.scene.y = my - (my - state.scene.y) * newScale / state.scene.scale;
        state.scene.scale = newScale;
        updateSceneTransform();
      }, { passive: false });
    }

    function escapeHtml(v) {
      return String(v || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    wireEvents();
    if (state.endpoint && state.secret) {
      loadAll();
    } else {
      setStatus('Set Apps Script URL and Secret in Config to begin.');
    }
  </script>
</body>
</html>
